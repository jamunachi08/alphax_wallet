<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="AlphaX Wallet">
  <defs>
    <linearGradient id="ax_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A2F87"/>
      <stop offset="100%" stop-color="#2B1038"/>
    </linearGradient>
    <radialGradient id="ax_glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#D97A9E" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#D97A9E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Wallet card body -->
  <rect x="6" y="14" width="52" height="38" rx="7" fill="url(#ax_grad)"/>
  <!-- Pink glow accent -->
  <rect x="6" y="14" width="52" height="38" rx="7" fill="url(#ax_glow)"/>
  <!-- Top stripe -->
  <rect x="6" y="22" width="52" height="6" fill="#18061F" opacity="0.55"/>
  <!-- Gold chip -->
  <rect x="12" y="34" width="9" height="7" rx="1.5" fill="#D9A54A"/>
  <!-- Greek alpha α in off-white -->
  <text x="50" y="46" text-anchor="end" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#F5EDEF">α</text>
</svg>
